<div class="login-container">
  <div class="top-nav">
    <span class="back-link" (click)="goBack()">← Tasks</span>
    <span class="breadcrumb"> / Profile</span>
  </div>
  <div class="login-card">
    <h2>My Profile</h2>

    <!-- User Info -->
    <div class="profile-info">
      <p><strong>Name:</strong> {{ name }}</p>
      <p><strong>Email:</strong> {{ email }}</p>
    </div>

    <!-- Update Name -->
    <div class="profile-section">
      <h3>Update Name</h3>

      <div class="input-group">
        <span class="icon">👤</span>
        <input type="text" [(ngModel)]="newName" placeholder="Enter new name" />
      </div>

      <button (click)="updateName()">Update Name</button>
    </div>

    <!-- Change Password -->
    <div class="profile-section">
      <h3>Change Password</h3>

      <div class="input-group">
        <span class="icon">🔒</span>
        <input type="password" [(ngModel)]="oldPassword" placeholder="Old Password" />
      </div>

      <div class="input-group">
        <span class="icon">🔒</span>
        <input type="password" [(ngModel)]="newPassword" placeholder="New Password" />
      </div>

      <button (click)="changePassword()">Change Password</button>
    </div>
  </div>
</div>
