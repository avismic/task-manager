<h2>Edit Task</h2>

<div *ngIf="task$ | async as t">

  <form (ngSubmit)="onSubmit(t)">

    <div>
      <label>Title:</label>
      <input 
        type="text" 
        [(ngModel)]="t.title" 
        name="title" 
        required 
      />
    </div>

    <div>
      <label>Description:</label>
      <textarea 
        [(ngModel)]="t.description" 
        name="description">
      </textarea>
    </div>

    <button type="submit">Update Task</button>

  </form>

</div>
