<div class="login-container">
  <div class="login-card">

    <h2>Create Account</h2>

    <form (ngSubmit)="onSubmit()">

      <div class="input-group">
        <span class="icon">👤</span>
        <input 
          type="text" 
          [(ngModel)]="name" 
          name="name" 
          placeholder="Full Name"
          required 
        />
      </div>

      <div class="input-group">
        <span class="icon">📧</span>
        <input 
          type="email" 
          [(ngModel)]="email" 
          name="email" 
          placeholder="Email"
          required 
        />
      </div>

      <div class="input-group">
        <span class="icon">🔒</span>
        <input 
          type="password" 
          [(ngModel)]="password" 
          name="password" 
          placeholder="Password"
          required 
        />
      </div>

      <button type="submit">
        Register
      </button>

    </form>

    <p style="margin-top: 12px">
      Already have an account?
      <a (click)="goToLogin()" style="cursor: pointer; color: #007bff">
        Login
      </a>
    </p>

  </div>
</div>
